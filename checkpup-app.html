/* ═══════════════════════════════════════
   SCORING ENGINE
   ═══════════════════════════════════════ */
function score(ans){
  const out={};
  const allQ=[...PHASE_A,...Object.entries(PHASE_B).flatMap(([g,qs])=>qs.map(q=>({...q,g})))];
  [...SCORABLE,...TRIAGE_IDS].forEach(g=>{
    const gqs=allQ.filter(q=>q.g===g);
    const done=gqs.filter(q=>ans[q.id]!==undefined);
    if(!done.length){out[g]={sig:0,conf:0,red:0,sc:0};return;}
    let s=0,mx=0;
    done.forEach(q=>{const w=q.w||1;s+=(ans[q.id]||0)*w;mx+=3*w;});
    const sig=mx?s/mx:0;
    const red=Math.min(done.length/4,1);
    const vals=done.map(q=>ans[q.id]||0);
    const ctr=done.length>=2?1-((Math.max(...vals)-Math.min(...vals))/3)*.5:.5;
    out[g]={sig,conf:sig*.5+red*.3+ctr*.2,red,sc:s};
  });
  return out;
}
function ranked(sc){return SCORABLE.map(g=>({g,...sc[g]})).sort((a,b)=>b.conf-a.conf);}
function severity(c){
  if(c>=.85)return{lv:"HIGH",color:"#DC2626",bg:"#FEF2F2",lb:"Needs Attention"};
  if(c>=.65)return{lv:"MOD",color:"#EA580C",bg:"#FFF7ED",lb:"Worth Watching"};
  if(c>=.45)return{lv:"MILD",color:"#B45309",bg:"#FFFBEB",lb:"Mild Signal"};
  return{lv:"LOW",color:"#059669",bg:"#ECFDF3",lb:"Looking Good"};
}
function adaptiveGroups(sc){return SCORABLE.filter(g=>sc[g].sig>.15).sort((a,b)=>sc[b].sig-sc[a].sig).slice(0,3);}
function flags(ans,ctx){
  const f={};
  const tQ=[...(PHASE_B.G4||[]),...(PHASE_B.G9||[]),PHASE_A.find(q=>q.id==="a4")].filter(Boolean);
  f.triage=tQ.some(q=>q.triage&&(ans[q.id]||0)>=1);
  f.dehydration=ctx.keeps_water===1;
  f.blood=ctx.blood===1;
  f.seizure=false;
  f.acute=ctx.limping_now===1||(ctx.onset<=7&&Object.values(ans).some(v=>v>=2));
  f.suppress=f.triage||f.dehydration||f.seizure;
  return f;
}
function vetReasons(fl){
  const r=[];
  if(fl.triage)r.push("Potential cardiac or kidney concern detected");
  if(fl.dehydration)r.push("Signs of dehydration \u2014 unable to keep water down");
  if(fl.blood)r.push("Blood reported in stool or vomit");
  if(fl.acute)r.push("Acute onset of symptoms");
  return r;
}

/* ---- Phase Bar (3-phase progress w/ endowed progress) ---- */
function PhaseBar({phase,step,total}){
  /* phase: 1=profile, 2=quiz, 3=results. Endowed progress starts at 8% */
  const pcts=[0,8,35,80,100];
  const base=pcts[phase]||0;
  const range=pcts[phase+1]-base;
  const pct=Math.min(base+range*(step/Math.max(total,1)),99);
  const labels=["","About Your Dog","Health Check","Your Results"];
  return React.createElement("div",{style:{position:"sticky",top:0,zIndex:90,background:"var(--bg)",padding:"10px 20px 0",borderBottom:"1px solid var(--border)"}},
    React.createElement("div",{style:{textAlign:"center",marginBottom:8}},
      React.createElement("img",{src:"https://checkpup.com/cdn/shop/files/Asset_1_300x_c1e1b68c-32d8-4691-918c-48b3f7fca461_384x96.png?v=1634664606",alt:"CheckPup",style:{height:24,objectFit:"contain"}})
    ),
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:11,fontWeight:600,color:"var(--muted)",letterSpacing:".04em",textTransform:"uppercase"}},
      labels.slice(1).map((l,i)=>React.createElement("span",{key:i,style:{color:i+1<=phase?"var(--accent)":"var(--muted)"}},l))
    ),
    React.createElement("div",{style:{height:4,borderRadius:2,background:"var(--border)",overflow:"hidden",marginBottom:10}},
      React.createElement("div",{style:{height:"100%",width:pct+"%",background:"var(--accent)",borderRadius:2,transition:"width .5s cubic-bezier(.16,1,.3,1)"}})
    )
  );
}

/* ---- Custom SVG Radar ---- */
function Radar({data,size}){
  const sz=size||280;
  const cx=sz/2,cy=sz/2,r=sz/2-40;
  const items=data.filter(d=>d.conf>.01);
  if(items.length<3)return null;
  const n=items.length;
  const angle=(i)=>((Math.PI*2*i)/n)-Math.PI/2;
  const rings=[.25,.5,.75,1];
  const pts=items.map((d,i)=>{const a=angle(i);const v=d.conf*r;return{x:cx+Math.cos(a)*v,y:cy+Math.sin(a)*v};});
  const poly=pts.map(p=>p.x+","+p.y).join(" ");
  return React.createElement("svg",{width:sz,height:sz,viewBox:"0 0 "+sz+" "+sz,style:{display:"block",margin:"0 auto"}},
    rings.map((rv,i)=>React.createElement("circle",{key:i,cx:cx,cy:cy,r:r*rv,fill:"none",stroke:"var(--border)",strokeWidth:1})),
    items.map((_,i)=>{const a=angle(i);return React.createElement("line",{key:i,x1:cx,y1:cy,x2:cx+Math.cos(a)*r,y2:cy+Math.sin(a)*r,stroke:"var(--border)",strokeWidth:1});}),
    React.createElement("polygon",{points:poly,fill:"rgba(194,89,10,.12)",stroke:"var(--accent)",strokeWidth:2}),
    pts.map((p,i)=>React.createElement("circle",{key:i,cx:p.x,cy:p.y,r:4,fill:"var(--accent)"})),
    items.map((d,i)=>{const a=angle(i);const lx=cx+Math.cos(a)*(r+20);const ly=cy+Math.sin(a)*(r+20);return React.createElement("text",{key:i,x:lx,y:ly,textAnchor:"middle",dominantBaseline:"middle",fontSize:10,fontWeight:600,fill:"var(--sub)"},GROUPS[d.g]?.short||d.g);})
  );
}

            React.createElement("span",{style:{fontSize:18}},GROUPS[f.g]?.icon),

          ),
          React.createElement("span",{style:{fontSize:11,fontWeight:700,color:severity(f.conf).color,background:severity(f.conf).color+"18",padding:"2px 8px",borderRadius:10}},severity(f.conf).lb)
        ),
        expandedIdx===i&&React.createElement("div",{className:"su",style:{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)"}},
          React.createElement("p",{style:{fontSize:13,color:"var(--sub)",lineHeight:1.55}},WHY_MAP[f.g]?WHY_MAP[f.g](name):GROUPS[f.g]?.desc)
        )
      ))
    ),

    /* Looking Good section */
    good.length>0&&React.createElement("div",{style:{background:"var(--green-bg)",border:"1px solid #86EFAC",borderRadius:"var(--r)",padding:"16px 18px",marginBottom:20}},
      React.createElement("h3",{style:{fontSize:14,fontWeight:700,color:"var(--green)",marginBottom:8}},"\u2705 Looking Good"),
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        good.map(f=>React.createElement("span",{key:f.g,style:{fontSize:12,fontWeight:500,color:"var(--green)",background:"#fff",padding:"4px 10px",borderRadius:12}},GROUPS[f.g]?.icon+" "+GROUPS[f.g]?.short))
      )
    ),

    /* Wellness Plan CTA (single CTA, first-person, opt-out) */
    !noComm&&planItems.length>0&&React.createElement("div",{style:{background:"var(--card)",border:"2px solid var(--accent)",borderRadius:"var(--r)",padding:"24px 20px",marginBottom:20}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
        React.createElement("h3",{style:{fontSize:17,fontWeight:800}},name+"'s Wellness Plan"),
        planSave>0&&React.createElement("span",{style:{fontSize:11,fontWeight:700,color:"var(--green)",background:"var(--green-bg)",padding:"3px 10px",borderRadius:12}},"Save $"+planSave+" as bundle")
      ),
      React.createElement("p",{style:{fontSize:13,color:"var(--sub)",marginBottom:16,lineHeight:1.5}},"Based on "+name+"'s top findings, our veterinary nutritionists recommend:"),
      planItems.map((p,i)=>React.createElement("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<planItems.length-1?"1px solid var(--border)":"none"}},
        React.createElement("span",{style:{fontSize:16}},GROUPS[p.group]?.icon),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{fontWeight:600,fontSize:13}},p.n),
          React.createElement("div",{style:{fontSize:11,color:"var(--muted)"}},p.v+" \u2014 "+p.d)
        ),
        React.createElement("span",{style:{fontWeight:700,fontSize:14,color:"var(--text)"}},"$"+p.p)
      )),
      React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0 0",marginTop:12,borderTop:"2px solid var(--border)"}},
        React.createElement("span",{style:{fontSize:14,fontWeight:700}},"Total: $"+(planTotal-planSave)+"/mo"),
        React.createElement("span",{style:{fontSize:12,color:"var(--muted)",textDecoration:"line-through"}},"$"+planTotal)
      ),
      /* Single CTA: first-person phrasing (+90% per research) */
      React.createElement("button",{onClick:()=>setShowPlan(true),style:{width:"100%",padding:"16px",background:"var(--accent)",color:"#fff",fontSize:16,fontWeight:700,borderRadius:"var(--r)",marginTop:16,animation:"glow 2.5s ease-in-out infinite"}},"Get "+name+"'s Plan"),
      React.createElement("div",{style:{textAlign:"center",marginTop:8}},
        React.createElement("span",{style:{fontSize:11,color:"var(--muted)"}},"Free shipping \u00B7 Cancel anytime \u00B7 Vet-formulated")
      )
    ),

    /* Diet recommendations */
    top.length>0&&RECS[top[0].g]&&React.createElement("div",{style:{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"20px",marginBottom:20}},
      React.createElement("h3",{style:{fontSize:15,fontWeight:700,marginBottom:12}},"\uD83E\uDD66 Dietary Guidance for "+name),
      RECS[top[0].g].diet.map((d,i)=>React.createElement("div",{key:i,style:{display:"flex",gap:8,padding:"6px 0",fontSize:13,color:"var(--text)",lineHeight:1.5}},
        React.createElement("span",{style:{color:"var(--green)",fontWeight:700}},"\u2713"),d
      ))
    ),

    /* Diagnostic bridge: "Confirm Your Results" (not buried upsell) */
    !noComm&&React.createElement("div",{style:{background:"linear-gradient(135deg,#F5F3FF,#EDE9FE)",border:"1px solid #C4B5FD",borderRadius:"var(--r)",padding:"20px",marginBottom:20,textAlign:"center"}},
      React.createElement("div",{style:{fontSize:28,marginBottom:8}},"\uD83E\uDDEA"),
      React.createElement("h3",{style:{fontSize:16,fontWeight:700,marginBottom:6}},"Want clinical confirmation?"),
      React.createElement("p",{style:{fontSize:13,color:"var(--sub)",lineHeight:1.55,marginBottom:14}},"Our Fur Tissue Mineral Analysis measures 30+ biomarkers to validate these findings with laboratory precision."),
      React.createElement("button",{style:{padding:"12px 24px",background:"#7C3AED",color:"#fff",fontSize:14,fontWeight:600,borderRadius:"var(--r)"}},"Learn About Testing \u2192")
    ),

    /* Footer disclaimer */
    React.createElement("p",{style:{fontSize:11,color:"var(--muted)",textAlign:"center",lineHeight:1.5,marginTop:12}},"This assessment is for informational purposes only and does not replace veterinary care. Always consult your veterinarian for medical decisions.")
  );
}

/* ═══════════════════════════════════════
   APP ORCHESTRATOR
   ═══════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState("landing");
  const [profile,setProfile]=useState({});
  const [ans,setAns]=useState({});
  const [ctx,setCtx]=useState({});
  const [email,setEmail]=useState("");
  const [adaptGrps,setAdaptGrps]=useState([]);
  const [fl,setFl]=useState({});
  const name=profile.name||"Your Dog";

  const onLanding=()=>setScreen("profile");
  const onProfile=(p)=>{setProfile(p);setScreen("phaseA");};
  const onPhaseA=(a)=>{
    const merged={...ans,...a};setAns(merged);
    const sc=score(merged);
    const sigs=SCORABLE.filter(g=>sc[g].sig>.15).length;
    setAdaptGrps(adaptiveGroups(sc));
    setScreen("transition");
  };
  const onTransition=()=>setScreen("email");
  const onEmail=(e)=>{setEmail(e);goContext();};
  const emailSkip=()=>goContext();
  const goContext=()=>{
    const active=CONTEXT_QS.filter(q=>q.trigger(ans));
    if(active.length)setScreen("context");
    else goDeepDive();
  };
  const onContext=(c)=>{setCtx(c);goDeepDive();};
  const goDeepDive=()=>{
    if(adaptGrps.length)setScreen("deepdive");
    else setScreen("analyzing");
  };
  const onDeepDive=(a)=>{
    const merged={...ans,...a};setAns(merged);setScreen("analyzing");
  };
  const onAnalyzing=()=>{
    const sc=score(ans);
    const f=flags(ans,ctx);
    setFl(f);
    try{fetch("https://checkpup-platform.vercel.app/api/submit-survey",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dog:{name:profile.name,breed_id:profile.breed,breed_label:profile.breedLabel,age_id:profile.age,age_label:profile.ageLabel,body_type:profile.bodyType,activity_level:profile.activity,diet_id:profile.diet,diet_label:profile.dietLabel,email:email},answers:ans,context_answers:ctx,engine_version:"v11"})});}catch(e){}
    if(f.suppress||vetReasons(f).length)setScreen("triage");
    else setScreen("results");
  };

  const sc=score(ans);
  const signalCount=SCORABLE.filter(g=>sc[g].sig>.15).length;
  const activeCtx=CONTEXT_QS.filter(q=>q.trigger(ans));
  const deepQs=adaptGrps.flatMap(g=>(PHASE_B[g]||[]).map(q=>({...q,g,fmt:"likert"})));

  switch(screen){
    case "landing":return React.createElement(Landing,{onStart:onLanding});
    case "profile":return React.createElement(ProfileFlow,{onDone:onProfile});
    case "phaseA":return React.createElement(QuestionScreen,{questions:PHASE_A,onDone:onPhaseA,phase:2,phaseName:"Quick Screen"});
    case "transition":return React.createElement(PhaseTransition,{signalCount:signalCount,name:name,onContinue:onTransition});
    case "email":return React.createElement(EmailCapture,{signalCount:signalCount,name:name,onSubmit:onEmail,onSkip:emailSkip});
    case "context":return React.createElement(ContextQ,{questions:activeCtx,onDone:onContext});
    case "deepdive":return React.createElement(QuestionScreen,{questions:deepQs,onDone:onDeepDive,phase:2,phaseName:"Deep Dive"});
    case "analyzing":return React.createElement(Analyzing,{systems:adaptGrps,onDone:onAnalyzing});
    case "triage":return React.createElement(Triage,{reasons:vetReasons(fl),name:name});
    case "results":return React.createElement(Results,{scores:sc,name:name,noComm:fl.suppress,profile:profile});
    default:return null;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
